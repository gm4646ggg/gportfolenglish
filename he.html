<!DOCTYPE html> 
<html lang="ru"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>1 курс</title> 
    <link rel="stylesheet" type="text/css" href="css/style.css"/> 
    <style> 
        body {      
            font-family: Arial, Helvetica, sans-serif;      
            margin: 0;      
            padding: 0;      
            background: url('img/oform/fonn.jpg') no-repeat center center fixed;      
            background-size: cover;      
            font-size: 16px;      
            color: #ffffff;      
            position: relative;      
        }      
        header {      
            background-color: rgba(0, 0, 0, 0.8);      
            padding: 30px;      
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.7);      
            text-align: center;     
            border-radius: 15px;      
            margin: 20px;      
        }      
        nav {      
            margin: 15px 0;      
        }      
        nav a {      
            margin: 0 15px;      
            text-decoration: none;      
            color: #f0f0f0;      
            font-size: 18px;      
            transition: color 0.3s;      
        }      
        nav a:hover {      
            color: #eaeaea;      
            text-decoration: underline;      
        }      
        h2 {      
            color: #ffffff;      
            font-size: 36px;      
            margin-bottom: 10px;      
            text-align: center;      
            position: relative;      
        }      
        h4 {      
            color: #f2f2f2;      
            font-size: 20px;      
            margin: 10px 0;      
            text-align: center;      
        }      
        .transparent-bg {      
            background-color: rgba(30, 30, 30, 0.9);      
            padding: 30px;      
            border-radius: 10px;      
            margin: 10px 20px;      
            max-width: 600px;      
            text-align: center;      
        }      
        .content-container {      
            display: flex;      
            flex-direction: column;      
            align-items: center;      
            margin-top: 5%;      
        }      
        .image-wrapper {  
            margin: 10px;  
            flex: 1;  
            display: flex;  
            justify-content: center;  
        }  
 
        img {      
            width: 100%;      
            height: auto;        
            transition: transform 0.3s;      
            border-radius: 10px;  
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);  
            cursor: pointer;
        }      
        img:hover {      
            transform: scale(1.05);      
        }      
 
        .contact-box {  
            background-color: rgba(0, 0, 0, 0.5); 
            border: 2px solid rgba(0, 0, 0, 0.5);  
            border-radius: 8px;  
            padding: 15px;      
            margin: 20px 0;  
            text-align: center;  
        }  
        
        #featured {  
            display: flex;  
            flex-wrap: wrap;  
            justify-content: space-around;  
            margin: 20px;  
        }

        /* Модальное окно для изображений */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s;
        }
        
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
            object-fit: contain;
        }
        
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s;
            z-index: 1001;
        }
        
        .close:hover {
            color: #f44336;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        /* Навигация в модальном окне */
        .prev, .next {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
            padding: 20px;
            user-select: none;
            transition: background-color 0.3s;
            z-index: 1001;
        }
        
        .prev:hover, .next:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        
        .prev {
            left: 20px;
        }
        
        .next {
            right: 20px;
        }
        
        /* Мобильная адаптация */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                margin: 15px;
                border-radius: 12px;
            }
            
            .transparent-bg {
                padding: 20px;
                margin: 10px 15px;
            }
            
            h2 {
                font-size: 28px;
            }
            
            h4 {
                font-size: 18px;
                line-height: 1.4;
            }
            
            .content-container {
                margin-top: 8%;
            }
            
            #featured {
                margin: 10px;
                flex-direction: column;
                align-items: center;
            }
            
            .image-wrapper {
                margin: 10px 0;
                width: 100%;
                max-width: 300px;
            }
            
            img {
                max-width: 100%;
            }
            
            .contact-box {
                margin: 20px 15px;
                padding: 12px;
            }
            
            .close {
                font-size: 30px;
                top: 10px;
                right: 15px;
            }
            
            .prev, .next {
                font-size: 20px;
                padding: 10px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }
            
            header {
                padding: 15px;
                margin: 10px;
                border-radius: 10px;
            }
            
            .transparent-bg {
                padding: 15px;
                margin: 10px;
            }
            
            h2 {
                font-size: 24px;
                margin-bottom: 8px;
            }
            
            h4 {
                font-size: 16px;
                line-height: 1.4;
                margin: 8px 0;
            }
            
            .content-container {
                margin-top: 10%;
            }
            
            #featured {
                margin: 10px 5px;
            }
            
            .image-wrapper {
                margin: 8px 0;
                max-width: 280px;
            }
            
            .contact-box {
                margin: 15px 10px;
                padding: 10px;
            }
        }
        
        @media (max-width: 360px) {
            h2 {
                font-size: 22px;
            }
            
            h4 {
                font-size: 15px;
            }
            
            .transparent-bg {
                padding: 12px;
            }
            
            .image-wrapper {
                max-width: 250px;
            }
        }
        
        @media (max-height: 600px) and (orientation: landscape) {
            #featured {
                flex-direction: row;
                flex-wrap: wrap;
            }
            
            .image-wrapper {
                width: 45%;
                max-width: 200px;
            }
            
            .modal-content {
                max-width: 80%;
                max-height: 80%;
            }
        }
        
        @media (min-width: 1200px) {
            .transparent-bg {
                max-width: 800px;
            }
            
            h2 {
                font-size: 40px;
            }
        }
    </style> 
</head> 
<body> 
    <div id="main-content"> 
        <div class="text-box"> 
        </div> 
        <section id="featured"> 
            <div class="image-wrapper">
                <img src="img/g.jpg" alt="Диплом 1" class="modal-image">
            </div> 
            <div class="image-wrapper"> 
                <img src="img/g1.jpg" alt="Диплом 2" class="modal-image">
            </div> 
        </section>
    </div>
    
    <!-- Модальное окно для изображений -->
    <div id="imageModal" class="modal">
        <span class="close">&times;</span>
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <script>
        // Получаем все изображения
        const images = document.querySelectorAll('.modal-image');
        const modal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImage');
        const closeBtn = document.querySelector('.close');
        const prevBtn = document.querySelector('.prev');
        const nextBtn = document.querySelector('.next');
        
        let currentIndex = 0;
        let allImages = [];
        
        // Собираем все изображения в один массив
        function collectAllImages() {
            allImages = Array.from(images);
        }
        
        // Открываем модальное окно
        function openModal(index) {
            currentIndex = index;
            modal.style.display = 'flex';
            modalImg.src = allImages[currentIndex].src;
            document.body.style.overflow = 'hidden'; // Блокируем прокрутку страницы
            
            // Сброс стилей для правильного отображения
            modalImg.style.width = 'auto';
            modalImg.style.height = 'auto';
            modalImg.style.maxWidth = '90%';
            modalImg.style.maxHeight = '90%';
            modalImg.style.objectFit = 'contain';
        }
        
        // Закрываем модальное окно
        function closeModal() {
            modal.style.display = 'none';
            document.body.style.overflow = 'auto'; // Восстанавливаем прокрутку
        }
        
        // Показываем следующее изображение
        function showNext() {
            currentIndex = (currentIndex + 1) % allImages.length;
            modalImg.src = allImages[currentIndex].src;
            
            // Сброс стилей для правильного отображения
            modalImg.style.width = 'auto';
            modalImg.style.height = 'auto';
            modalImg.style.maxWidth = '90%';
            modalImg.style.maxHeight = '90%';
            modalImg.style.objectFit = 'contain';
        }
        
        // Показываем предыдущее изображение
        function showPrev() {
            currentIndex = (currentIndex - 1 + allImages.length) % allImages.length;
            modalImg.src = allImages[currentIndex].src;
            
            // Сброс стилей для правильного отображения
            modalImg.style.width = 'auto';
            modalImg.style.height = 'auto';
            modalImg.style.maxWidth = '90%';
            modalImg.style.maxHeight = '90%';
            modalImg.style.objectFit = 'contain';
        }
        
        // Обработчики событий
        images.forEach((img, index) => {
            img.addEventListener('click', () => {
                collectAllImages();
                openModal(index);
            });
        });
        
        closeBtn.addEventListener('click', closeModal);
        nextBtn.addEventListener('click', showNext);
        prevBtn.addEventListener('click', showPrev);
        
        // Закрытие при клике вне изображения
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                closeModal();
            }
        });
        
        // Навигация с помощью клавиатуры
        document.addEventListener('keydown', (e) => {
            if (modal.style.display === 'flex') {
                if (e.key === 'Escape') {
                    closeModal();
                } else if (e.key === 'ArrowRight') {
                    showNext();
                } else if (e.key === 'ArrowLeft') {
                    showPrev();
                }
            }
        });
        
        // Предзагрузка изображений для плавного перехода
        window.addEventListener('load', () => {
            collectAllImages();
        });
    </script>
</body> 
</html>
