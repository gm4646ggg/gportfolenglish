<!DOCTYPE html>      
<html lang="en">      
<head>      
    <meta charset="UTF-8"/>      
    <link rel="stylesheet" type="text/css" href="css/style.css"/>      
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>      
    <title>Portfolio - About Me</title>      
    <style>      
        body {      
            font-family: Arial, Helvetica, sans-serif;      
            margin: 0;      
            padding: 0;      
            background: url('img/oform/fonn.jpg') no-repeat center center fixed;      
            background-size: cover;      
            font-size: 16px;      
            color: #ffffff;      
            position: relative;      
        }      
        header {      
            background-color: rgba(0, 0, 0, 0.8);      
            padding: 30px;      
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.7);      
            text-align: center;     
            border-radius: 15px;      
            margin: 20px;      
        }      
        nav {      
            margin: 15px 0;      
        }      
        nav a {      
            margin: 0 15px;      
            text-decoration: none;      
            color: #f0f0f0;      
            font-size: 18px;      
            transition: color 0.3s;      
        }      
        nav a:hover {      
            color: #eaeaea;      
            text-decoration: underline;      
        }      
        h2 {      
            color: #ffffff;      
            font-size: 36px;      
            margin-bottom: 10px;      
            text-align: center;      
            position: relative;      
        }      
        h4 {      
            color: #f2f2f2;      
            font-size: 20px;      
            margin: 10px 0;      
            text-align: center;      
        }      
        .transparent-bg {      
            background-color: rgba(30, 30, 30, 0.9);      
            padding: 30px;      
            border-radius: 10px;      
            margin: 10px 20px;      
            max-width: 600px;      
            text-align: center;      
        }      
        .content-container {      
            display: flex;      
            flex-direction: column;      
            align-items: center;      
            margin-top: 5%;      
        }      
        .image-wrapper {  
            margin: 10px;  
            flex: 0 0 100%;  
            max-width: 600px;  
        }  
 
        img {      
            width: 100%;      
            height: auto;        
            transition: transform 0.3s;      
            border-radius: 10px;  
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);  
        }      
        img:hover {      
            transform: scale(1.05);      
        }      
 
        .contact-box {  
            background-color: rgba(0, 0, 0, 0.5); 
            border: 2px solid rgba(0, 0, 0, 0.5);  
            border-radius: 8px;  
            padding: 15px;      
            margin: 20px 0;  
            text-align: center;  
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .contact-box h3 {
            margin-top: 0;
            color: #ffffff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 10px;
        }
        
        .contact-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        
        .contact-list li {
            margin: 12px 0;
            padding: 8px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            transition: all 0.3s;
        }
        
        .contact-list li:hover {
            background-color: rgba(255, 255, 255, 0.2);
            transform: translateX(5px);
        }
        
        .contact-list a {
            color: #ffffff;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: color 0.3s;
        }
        
        .contact-list a:hover {
            color: #4fc3f7;
            text-decoration: underline;
        }
        
        .contact-icon {
            font-size: 20px;
        }
        
        .telegram-link {
            background-color: rgba(0, 136, 204, 0.2);
            border-left: 4px solid #0088cc;
        }
        
        .telegram-link:hover {
            background-color: rgba(0, 136, 204, 0.3);
        }
        
        .phone-link {
            background-color: rgba(76, 175, 80, 0.2);
            border-left: 4px solid #4caf50;
        }
        
        .phone-link:hover {
            background-color: rgba(76, 175, 80, 0.3);
        }

        /* Mobile adaptation */
        @media (max-width: 768px) {
            header {
                padding: 20px;
                margin: 15px;
                border-radius: 12px;
            }
            .transparent-bg {
                padding: 20px;
                margin: 10px 15px;
            }
            h2 {
                font-size: 28px;
            }
            h4 {
                font-size: 18px;
                line-height: 1.4;
            }
            .content-container {
                margin-top: 8%;
            }
            .image-wrapper {
                margin: 10px 15px;
                max-width: 100%;
            }
            .contact-box {
                margin: 20px 15px;
                padding: 12px;
            }
            .contact-list li {
                margin: 10px 0;
                padding: 10px;
            }
        }
        @media (max-width: 480px) {
            body {
                font-size: 14px;
            }
            header {
                padding: 15px;
                margin: 10px;
                border-radius: 10px;
            }
            .transparent-bg {
                padding: 15px;
                margin: 10px;
            }
            h2 {
                font-size: 24px;
                margin-bottom: 8px;
            }
            h4 {
                font-size: 16px;
                line-height: 1.4;
                margin: 8px 0;
            }
            .content-container {
                margin-top: 10%;
            }
            .contact-box {
                margin: 15px 10px;
                padding: 10px;
            }
            .contact-box h3 {
                font-size: 18px;
                margin-bottom: 8px;
                padding-bottom: 8px;
            }
            .contact-list li {
                margin: 8px 0;
                padding: 8px;
                font-size: 14px;
            }
            .contact-icon {
                font-size: 18px;
            }
        }
        @media (max-width: 360px) {
            h2 {
                font-size: 22px;
            }
            h4 {
                font-size: 15px;
            }
            .transparent-bg {
                padding: 12px;
            }
            .contact-list a {
                flex-direction: column;
                gap: 5px;
            }
        }
        @media (max-height: 600px) and (orientation: landscape) {
            .content-container {
                margin-top: 2%;
            }
            header {
                padding: 15px;
                margin: 10px;
            }
            .transparent-bg {
                padding: 15px;
            }
            .contact-box {
                margin: 10px auto;
                max-width: 500px;
            }
        }
    </style>      
</head>      
<body>      
    <header>      
        <div class="transparent-bg">      
            <h2>About Me</h2> 
            <h4>I am Herman Germanchuk.    
                Student of GPAOU AO APK, 4th year, 
                majoring in "Information Systems and Programming". I strive to develop my skills in programming and information systems.</h4>      
        </div>      
    </header>      
    <div class="content-container">  
        <section id="featured">  
            <div class="image-wrapper">  
                <a href="one.html"><img src="img/photo_5328270736349061669_y (1).jpg" alt="Diploma 1"></a>  
            </div>  
        </section>  
    </div>  
    <div class="contact-box"> 
        <h3>Contact Me</h3> 
        <ul class="contact-list">
            <li class="phone-link">
                <a href="tel:+71234567890">
                    <span class="contact-icon"></span>
                    <span>Phone: +7 (123) 456-78-90</span>
                </a>
            </li>
            <li class="telegram-link">
                <a href="https://t.me/username" target="_blank" rel="noopener noreferrer">
                    <span class="contact-icon"></span>
                    <span>Telegram: @G_GermaN_N</span>
                </a>
            </li>
        </ul>
    </div> 
</body>      
</html>
